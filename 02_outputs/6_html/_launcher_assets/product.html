<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <link rel="stylesheet" href="/__ASSET_PREFIX__/launcher.css" />
</head>
<body data-session-state-url="__SESSION_STATE_URL__" data-category="__CATEGORY__" data-product-id="__PRODUCT_ID__">
    <div class="page-shell">
        <ul class="breadcrumbs">
            <li><a href="/_launcher/index.html">总览</a></li>
            <li>/</li>
            <li><a href="__CATEGORY_PAGE_URL__">__CATEGORY__</a></li>
            <li>/</li>
            <li>__PRODUCT_ID__</li>
        </ul>
        <section id="status-banner" class="status-banner running">
            <div class="eyebrow">Product View</div>
            <div id="status-headline" class="headline">--</div>
            <div id="status-caption" class="caption">--</div>
        </section>
        <section class="hero">
            <h1 id="page-title">--</h1>
            <div id="page-note" class="hero-note">--</div>
            <div class="hero-meta">
                <div class="meta-card"><div class="meta-label">Review Limit</div><div id="meta-review-limit" class="meta-value">--</div><div class="meta-sub">本商品评论数量</div></div>
                <div class="meta-card"><div class="meta-label">Progress</div><div id="meta-progress" class="meta-value">--</div><div class="meta-sub">当前商品整体进度</div></div>
                <div class="meta-card"><div class="meta-label">ETA</div><div id="meta-eta" class="meta-value">--</div><div class="meta-sub">剩余时间</div></div>
                <div class="meta-card"><div class="meta-label">Finish</div><div id="meta-finish" class="meta-value">--</div><div class="meta-sub">预计完成时间</div></div>
            </div>
        </section>
        <section class="content-grid">
            <section class="panel">
                <h2>商品详细进度</h2>
                <div id="product-viewer"></div>
            </section>
            <aside class="panel">
                <h2>商品摘要</h2>
                <div id="summary-body" class="collection"></div>
            </aside>
        </section>
    </div>
    <script src="/__ASSET_PREFIX__/common.js"></script>
    <script src="/__ASSET_PREFIX__/product.js"></script>
</body>
</html>
